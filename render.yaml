databases:
  - name: demo-claims-db
    databaseName: demo_claims
    user: demo_claims_user
    plan: free

services:
  - type: web
    name: demo-claims
    plan: free
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npx tsx prisma/seed.ts && npm run build && cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public
    startCommand: node .next/standalone/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: demo-claims-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
